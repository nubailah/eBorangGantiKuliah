<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ganti Kuliah</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:10px;}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid #ccc;
  padding:5px;
  font-size:11px;
  text-align:center;
  word-wrap:break-word;
}

.detailRow{display:none;background:#f9f9f9;}

.baru{background:#fff3cd;}
.lulus{background:#d4edda;}
.reject{background:#f8d7da;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<h3>SISTEM PENGGANTIAN KULIAH</h3>

<input id="id" placeholder="ID">
<input id="pass" type="password" placeholder="PASSWORD">
<button onclick="login()">Login</button>

<div id="app" style="display:none;">

<h3 id="welcome"></h3>

<button onclick="loadData()">Refresh</button>
<button onclick="downloadPDF()">Download PDF</button>

<table>
  <tbody id="tbody"></tbody>
</table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwt1IPuLICwQlzMW9IbSLG9PmbrmVNcIxadw2u5RiHnsqoPJqXrEkodbFCdPxZMizEheA/exec";

let user=null;
let store=[];

// ================= LOGIN =================
function login(){

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"login",
    id:id.value,
    pass:pass.value
  })
})
.then(r=>r.json())
.then(res=>{

  if(!res.ok){
    alert("Login gagal");
    return;
  }

  user=res;

  document.getElementById("app").style.display="block";
  welcome.innerText = res.name + " | " + res.jabatan;

  loadData();

});

}

// ================= LOAD DATA (MATCH CODE.GS GETDATA) =================
function loadData(){

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"getData",
    role:user.role,
    id:user.id,
    jabatan:user.jabatan
  })
})
.then(r=>r.json())
.then(res=>{

  store = res;

  let html="";

  html+=`
  <tr>
    <th>No</th>
    <th>ID</th>
    <th>Sebab</th>
    <th>Kursus</th>
    <th>Status</th>
  </tr>`;

  res.forEach((r,i)=>{

    let cls =
      r.status==="BARU"?"baru":
      r.status==="Diluluskan"?"lulus":"reject";

    html+=`
    <tr class="${cls}" onclick="toggle(${i})">
      <td>${i+1}</td>
      <td>${r.noGanti}</td>
      <td>${r.sebab}</td>
      <td>${r.A_KURSUS}</td>
      <td>${r.status}</td>
    </tr>

    <tr id="d${i}" class="detailRow">
      <td colspan="5">
        <b>DETAIL KULIAH ASAL</b><br>
        Kelas: ${r.A_KELAS}<br>
        Tarikh: ${r.A_TARIKH}<br>
        Masa: ${r.A_MASA}<br>
        Bilik: ${r.A_BILIK}<br><br>

        <b>GANTI</b><br>
        Tarikh: ${r.G_TARIKH}<br>
        Masa: ${r.G_MASA}<br>
        Bilik: ${r.G_BILIK}
      </td>
    </tr>
    `;
  });

  tbody.innerHTML=html;

});

}

// ================= TOGGLE =================
function toggle(i){
  let el=document.getElementById("d"+i);
  el.style.display = el.style.display==="table-row"?"none":"table-row";
}

// ================= PDF (MATCH DATASTORE) =================
function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF("l","mm","a4");

doc.text("BORANG PENGGANTIAN KULIAH", 148, 15, {align:"center"});

let table = store.map((r,i)=>[
  i+1,
  r.noGanti,
  r.sebab,
  r.A_KURSUS,
  r.A_KELAS,
  r.A_TARIKH,
  r.A_MASA,
  r.A_BILIK,
  r.G_TARIKH,
  r.G_MASA,
  r.G_BILIK,
  r.status
]);

doc.autoTable({
  startY:25,
  head:[[
    "Bil","ID","Sebab","Kursus","Kelas",
    "Tarikh","Masa","Bilik",
    "G Tarikh","G Masa","G Bilik","Status"
  ]],
  body:table,
  styles:{fontSize:7}
});

doc.save("ganti_kuliah.pdf");

}

</script>

</body>
</html>
