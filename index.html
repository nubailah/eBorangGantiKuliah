<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ganti Kuliah System</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:10px;}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  background:#fff;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  font-size:11px;
  text-align:center;
  word-wrap:break-word;
}

.detailRow{display:none;background:#f9f9f9;}

button{padding:5px 8px;margin:2px;cursor:pointer;}

.baru{background:#fff3cd;}
.lulus{background:#d4edda;}
.reject{background:#f8d7da;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<h3>SISTEM PENGGANTIAN KULIAH</h3>

<button onclick="loadData()">Refresh</button>
<button onclick="downloadPDF()">Download PDF</button>

<table>
  <tbody id="tbody"></tbody>
</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbwt1IPuLICwQlzMW9IbSLG9PmbrmVNcIxadw2u5RiHnsqoPJqXrEkodbFCdPxZMizEheA/exec";

let dataStore = [];

// ================= LOAD =================
function loadData(){

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"getData",
    role:"admin",
    id:"",
    jabatan:""
  })
})
.then(r=>r.json())
.then(res=>{

  dataStore = res;

  let html="";

  html+=`
  <tr>
    <th>No</th>
    <th>ID</th>
    <th>SEBAB</th>
    <th>KURSUS</th>
    <th>STATUS</th>
  </tr>`;

  res.forEach((r,i)=>{

    html+=`
      <tr onclick="toggle(${i})" class="${r.status==='BARU'?'baru':r.status==='Diluluskan'?'lulus':'reject'}">
        <td>${i+1}</td>
        <td>${r.noGanti}</td>
        <td>${r.sebab}</td>
        <td>${r.A_KURSUS}</td>
        <td>${r.status}</td>
      </tr>

      <tr id="d${i}" class="detailRow">
        <td colspan="5">
          <b>DETAIL</b><br>
          Tarikh: ${r.A_TARIKH}<br>
          Masa: ${r.A_MASA}<br>
          Bilik: ${r.A_BILIK}<br>
          Ganti: ${r.G_TARIKH} | ${r.G_MASA} | ${r.G_BILIK}
        </td>
      </tr>
    `;
  });

  tbody.innerHTML=html;

});

}

// ================= TOGGLE CLICKABLE =================
function toggle(i){
  let el=document.getElementById("d"+i);
  el.style.display = el.style.display==="table-row"?"none":"table-row";
}

// ================= PDF DOWNLOAD =================
function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF("l","mm","a4");

doc.setFontSize(14);
doc.text("BORANG PENGGANTIAN KULIAH", 148, 15, {align:"center"});

let table = dataStore.map((r,i)=>[
  i+1,
  r.noGanti,
  r.sebab,
  r.A_KURSUS,
  r.A_KELAS,
  r.A_TARIKH,
  r.A_MASA,
  r.A_BILIK,
  r.status
]);

doc.autoTable({
  startY:25,
  head:[["Bil","ID","Sebab","Kursus","Kelas","Tarikh","Masa","Bilik","Status"]],
  body:table,
  styles:{fontSize:8}
});

doc.save("ganti_kuliah.pdf");

}

loadData();

</script>

</body>
</html>
