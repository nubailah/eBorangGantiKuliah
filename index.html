<!-- LOGIN -->
<div id="loginBox" class="card">
  
  

  <h3>LOGIN</h3>

  <input id="id" placeholder="NO GAJI">
  <input id="pass" type="password" placeholder="PASSWORD">

<!-- DASHBOARD -->

<h3 id="welcome"></h3>

<button onclick="logout()" 
style="float:right;background:#e74c3c;color:white;border:none;border-radius:5px;">
Logout
</button>

<div id="formBox" class="card" style="display:none;">

<textarea id="sebab" rows="3" style="width:100%; resize:vertical; font-size:12px; padding:4px;"></textarea>

  <button onclick="submitForm()">Hantar Permohonan</button>

  <h3>SENARAI PERMOHONAN PENGGANTIAN KULIAH</h3>

<script>

const API = "https://script.google.com/macros/s/AKfycbwt1IPuLICwQlzMW9IbSLG9PmbrmVNcIxadw2u5RiHnsqoPJqXrEkodbFCdPxZMizEheA/exec"; // ⭐ WAJIB
let user=null;
let editMode={};

let user=null;
let editMode={};

// ================= DATE FORMAT MALAYSIA =================
function formatDate(d){
  if(!d) return "";
  let date=new Date(d);
  let dd=String(date.getDate()).padStart(2,"0");
  let mm=String(date.getMonth()+1).padStart(2,"0");
  let yy=date.getFullYear();
  return `${dd}/${mm}/${yy}`;
}

// ================= LOGIN =================
async function login(){

  let res = await fetch(`${API}?action=login&id=${id.value}&pass=${pass.value}`);
  let data = await res.json();

  if(!data.ok){
    alert("Login gagal");
    return;
  }

  user = data;

  formBox.style.display = "none";

  document.getElementById("pdfBtn").style.display =
    (user.role === "lecturer") ? "inline-block" : "none";

  loginBox.style.display="none";
  dashboard.style.display="block";

  welcome.innerText=user.name+" | "+user.jabatan;

  if(user.role === "lecturer"){
    formBox.style.display = "block";
  }

  loadData();
}
// ================= ADD =================
function addRow(){

  let box = document.getElementById("kelasBox");

  // ❌ kalau dah ada, jangan tambah lagi
  if(box.children.length > 0){
    alert("Sila hantar permohonan ini dahulu sebelum tambah kelas baru");
    return;
  }

  let div=document.createElement("div");
  div.className="kelas-item";

  div.innerHTML=`
    <b>KULIAH ASAL</b><br>

     <select class="A_JENIS"style="width:10%; padding:4px; font-size:11px;">
    <option value="">-- Pilih Jenis Kuliah --</option>
    <option value="Bersemuka">Bersemuka</option>
    <option value="Dalam Talian (Asynchronous)">Dalam Talian (Asynchronous)</option>
    <option value="Dalam Talian (Synchronous)">Dalam Talian (Synchronous)</option>
  </select>

    Kursus <input class="A_KURSUS"style="width:10%; padding:4px; font-size:11px;">
    Kelas <input class="A_KELAS">
    Tarikh ASAL<input type="date" class="A_TARIKH"style="width:10%; padding:4px; font-size:11px;">
    Masa ASAL<input class="A_MASA"style="width:10%; padding:4px; font-size:11px;">
    Bilik ASAL <input class="A_BILIK"style="width:10%; padding:4px; font-size:11px;"><br><br>
    

    <b>KULIAH GANTI</b><br>
  <select class="G_JENIS"style="width:10%; padding:4px; font-size:11px;"">
    <option value="">-- Pilih Jenis Kuliah --</option>
    <option value="Bersemuka">Bersemuka</option>
    <option value="Dalam Talian (Asynchronous)">Dalam Talian (Asynchronous)</option>
     <option value="Dalam Talian (Synchronous)">Dalam Talian (Synchronous)</option>
  </select>

    Tarikh GANTI <input type="date" class="G_TARIKH"style="width:10%; padding:4px; font-size:11px;">
    Masa GANTI<input class="G_MASA"style="width:10%; padding:4px; font-size:11px;">
    Bilik GANTI<input class="G_BILIK"style="width:10%; padding:4px; font-size:11px;">
  `;

  box.appendChild(div);
}



// ================= SUBMIT =================
async function submitForm(){

  let cards=document.querySelectorAll("#kelasBox .kelas-item");

  if(cards.length === 0){
    alert("Sila isi kelas dahulu");
    return;
  }

  let c = cards[0];

  let payload = {
    action:"submit",
    data: JSON.stringify({
      id:user.id,
      name:user.name,
      jabatan:user.jabatan,
      sebab:sebab.value,
      classes:[{
        A_JENIS:c.querySelector(".A_JENIS").value,
        A_KURSUS:c.querySelector(".A_KURSUS").value,
        A_KELAS:c.querySelector(".A_KELAS").value,
        A_TARIKH:c.querySelector(".A_TARIKH").value,
        A_MASA:c.querySelector(".A_MASA").value,
        A_BILIK:c.querySelector(".A_BILIK").value,
        G_JENIS:c.querySelector(".G_JENIS").value,
        G_TARIKH:c.querySelector(".G_TARIKH").value,
        G_MASA:c.querySelector(".G_MASA").value,
        G_BILIK:c.querySelector(".G_BILIK").value
      }]
    })
  };

  await fetch(API,{
    method:"POST",
    body: new URLSearchParams(payload)
  });

  alert("Permohonan berjaya dihantar!");
  document.getElementById("kelasBox").innerHTML="";
  loadData();
}

// ================= LOAD TABLE =================
async function loadData(){

  let res = await fetch(
    `${API}?action=getData&role=${user.role}&userId=${user.id}&jabatan=${user.jabatan}`
  );

  let data = await res.json();

  let html="";

  // ❌ BUANG sort sini kalau backend dah sort
  // data.sort(...)

  data.forEach(r=>{

    let isLocked = (r.status === "Diluluskan");
    let isEdit = editMode[r.noGanti];
    let canEdit = !isLocked;

    let rowClass =
      r.status==="BARU"?"baru":
      r.status==="Diluluskan"?"lulus":"reject";

    html += `
    <tr class="${rowClass}">

    ${user.role==="lecturer" ? `
<td><input type="checkbox" class="pdfCheck" value="${r.noGanti}"></td>` : ""}

    <td onclick="toggle('${r.noGanti}')" style="cursor:pointer;color:blue">
      ${r.noGanti}
    </td>

    <td>${r.sebab}</td>
    <td>${r.A_KURSUS}</td>
    <td>${r.status}</td>

    <td>
      <button onclick="editSave('${r.noGanti}')">EDIT</button>
      <button onclick="del('${r.noGanti}')">DEL</button>
    </td>

    </tr>
    `;
  });

  tbody.innerHTML = html;
}
// ================= TOGGLE =================
function toggle(id){
  let el=document.getElementById("d-"+id);
  el.style.display=el.style.display==="table-row"?"none":"table-row";
}

// ================= EDIT SAVE =================
async function editSave(no){

  if(!editMode[no]){
    editMode[no]=true;
    loadData();
    return;
  }

  let updated={
    sebab:document.getElementById("s-"+no)?.value,
    status:document.getElementById("st-"+no)?.value
  };

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"update",
      no:no,
      data:JSON.stringify(updated)
    })
  });

  delete editMode[no];
  loadData();
}

   async function downloadPDF(){

  let checked = Array.from(document.querySelectorAll(".pdfCheck:checked"))
    .map(cb => cb.value);

  if(checked.length === 0){
    alert("Sila tick data dulu");
    return;
  }

  // ✅ AMBIL DATA
  let res = await fetch(
    `${API}?action=getData&role=${user.role}&userId=${user.id}&jabatan=${user.jabatan}`
  );

  let data = await res.json();

  let selected = data.filter(r => checked.includes(r.noGanti));

  if(selected.length === 0){
    alert("Data tak jumpa");
    return;
  }

  let jabatan = selected[0].jabatan;

  // ✅ AMBIL DATA KJ
  let kjRes = await fetch(`${API}?action=getKJ&jabatan=${jabatan}`);
  let kj = await kjRes.json();

  // ================= PDF =================
  const doc = new window.jspdf.jsPDF("l","mm","a4");

  doc.setFontSize(14);
  doc.text("BORANG PENGGANTIAN KULIAH", 148, 15, {align:"center"});

  doc.setFontSize(10);
  doc.text("Tarikh Cetakan: " + new Date().toLocaleDateString(), 14, 25);

  let tableData = selected.map((r,i)=>[
    i+1,
    r.sebab || "",
    r.A_JENIS || "",
    r.A_KURSUS || "",
    r.A_KELAS || "",
    formatDate(r.A_TARIKH),
    r.A_MASA || "",
    r.A_BILIK || "",
    r.G_JENIS || "",
    formatDate(r.G_TARIKH),
    r.G_MASA || "",
    r.G_BILIK || "",
    r.status || ""
  ]);

  doc.autoTable({
    startY: 35,
    head: [[
      "Bil","Sebab","Jenis","Kursus","Kelas",
      "Tarikh ASAL","Masa ASAL","Bilik ASAL",
      "Tarikh GANTI","Masa GANTI","Bilik GANTI","Status"
    ]],
    body: tableData,
    styles: { fontSize: 8 }
  });

  let y = doc.lastAutoTable.finalY + 15;

  doc.text("Disediakan oleh: " + (selected[0].name || ""), 14, y);
  doc.text("JABATAN: " + (selected[0].jabatan || ""), 14, y + 6);

  doc.text("Disahkan oleh KETUA JABATAN: " + kj.name, 148, y);
  doc.text("JABATAN: " + kj.jabatan, 148, y + 6);

  doc.text(
    "DOKUMEN INI TIDAK MEMERLUKAN TANDATANGAN KOMPUTER",
    148,
    200,
    {align:"center"}
  );

  doc.save("BORANG_PENGGANTIAN.pdf");
}
   
// ================= DELETE =================
async function del(no){

  if(!confirm("Delete?")) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"delete",
      no:no
    })
  });

  loadData();
}

function logout(){

  let confirmExit = confirm("Pastikan semua data telah disimpan.\nAdakah anda pasti ingin log keluar?");

  if(!confirmExit){
    return; // ❌ user cancel
  }

  // reset user
  user = null;

  // clear UI
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginBox").style.display = "block";

  // clear input login
  document.getElementById("id").value = "";
  document.getElementById("pass").value = "";

  // clear table
  document.getElementById("tbody").innerHTML = "";

  // clear form
  document.getElementById("kelasBox").innerHTML = "";

  // optional: clear sebab
  document.getElementById("sebab").value = "";
}

</script>
