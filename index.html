<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Penggantian Kuliah</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:10px;}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  background:white;
}

th,td{
  border:1px solid #ccc;
  padding:5px;
  font-size:11px;
  text-align:center;
  word-wrap:break-word;
}

.detailRow{display:none;background:#f9f9f9;}

input,select,textarea{
  font-size:11px;
  padding:3px;
}

button{
  padding:5px 8px;
  margin:2px;
  cursor:pointer;
  font-size:11px;
}

.baru{background:#fff3cd;}
.lulus{background:#d4edda;}
.reject{background:#f8d7da;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>LOGIN</h3>
  <input id="id" placeholder="ID"><br><br>
  <input id="pass" type="password" placeholder="PASSWORD"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none;">

<h3 id="welcome"></h3>

<button onclick="loadData()">Refresh</button>
<button onclick="downloadPDF()">PDF</button>

<!-- FORM -->
<div class="card">
  <h4>BORANG PENGGANTIAN</h4>

  <textarea id="sebab" placeholder="SEBAB"></textarea><br><br>

  <button onclick="addRow()">+ Tambah Kelas</button>
  <button onclick="submitForm()">Hantar</button>

  <div id="kelasBox"></div>
</div>

<!-- TABLE -->
<div class="card">
  <h4>SENARAI PERMOHONAN</h4>

  <table>
    <tbody id="tbody"></tbody>
  </table>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwt1IPuLICwQlzMW9IbSLG9PmbrmVNcIxadw2u5RiHnsqoPJqXrEkodbFCdPxZMizEheA/exec";

let user=null;
let store=[];
let editMode={};

// ================= LOGIN =================
function login(){

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"login",
    id:id.value,
    pass:pass.value
  })
})
.then(r=>r.json())
.then(res=>{

  if(!res.ok){
    alert("Login gagal");
    return;
  }

  user=res;

  loginBox.style.display="none";
  app.style.display="block";

  welcome.innerText = res.name + " | " + res.jabatan;

  loadData();

});

}

// ================= ADD ROW =================
function addRow(){

if(document.querySelector(".kelas-item")){
  alert("Hantar dulu sebelum tambah lagi");
  return;
}

let div=document.createElement("div");
div.className="kelas-item";

div.innerHTML=`
<hr>

<b>KULIAH ASAL</b><br>
Kursus <input class="A_KURSUS">
Kelas <input class="A_KELAS">
Tarikh <input type="date" class="A_TARIKH">
Masa <input class="A_MASA">
Bilik <input class="A_BILIK"><br><br>

<b>KULIAH GANTI</b><br>
Tarikh <input type="date" class="G_TARIKH">
Masa <input class="G_MASA">
Bilik <input class="G_BILIK">
`;

kelasBox.appendChild(div);

}

// ================= SUBMIT =================
function submitForm(){

let c=document.querySelector(".kelas-item");

let payload={
  id:user.id,
  name:user.name,
  jabatan:user.jabatan,
  sebab:sebab.value,
  classes:[{
    A_KURSUS:c.querySelector(".A_KURSUS").value,
    A_KELAS:c.querySelector(".A_KELAS").value,
    A_TARIKH:c.querySelector(".A_TARIKH").value,
    A_MASA:c.querySelector(".A_MASA").value,
    A_BILIK:c.querySelector(".A_BILIK").value,

    G_TARIKH:c.querySelector(".G_TARIKH").value,
    G_MASA:c.querySelector(".G_MASA").value,
    G_BILIK:c.querySelector(".G_BILIK").value
  }]
};

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"submit",
    payload:payload
  })
})
.then(r=>r.json())
.then(()=>{

  alert("Berjaya dihantar!");

  kelasBox.innerHTML="";
  loadData();

});

}

// ================= LOAD DATA =================
function loadData(){

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"getData",
    role:user.role,
    id:user.id,
    jabatan:user.jabatan
  })
})
.then(r=>r.json())
.then(res=>{

store=res;

let html="";

html+=`
<tr>
<th>ID</th>
<th>SEBAB</th>
<th>KURSUS</th>
<th>KELAS</th>
<th>TARIKH</th>
<th>MASA</th>
<th>BILIK</th>
<th>STATUS</th>
<th>ACTION</th>
</tr>`;

res.forEach(r=>{

let isEdit = editMode[r.noGanti];

html+=`
<tr class="${r.status==='BARU'?'baru':r.status==='Diluluskan'?'lulus':'reject'}">

<td>${r.noGanti}</td>

<td>
${isEdit ? `<input id="s-${r.noGanti}" value="${r.sebab}">` : r.sebab}
</td>

<td>
${isEdit ? `<input id="k-${r.noGanti}" value="${r.A_KURSUS}">` : r.A_KURSUS}
</td>

<td>
${isEdit ? `<input id="kl-${r.noGanti}" value="${r.A_KELAS}">` : r.A_KELAS}
</td>

<td>
${isEdit ? `<input type="date" id="t-${r.noGanti}" value="${r.A_TARIKH}">` : r.A_TARIKH}
</td>

<td>
${isEdit ? `<input id="m-${r.noGanti}" value="${r.A_MASA}">` : r.A_MASA}
</td>

<td>
${isEdit ? `<input id="b-${r.noGanti}" value="${r.A_BILIK}">` : r.A_BILIK}
</td>

<td>${r.status}</td>

<td>
<button onclick="editSave('${r.noGanti}')">
${isEdit ? "SAVE" : "EDIT"}
</button>

<button onclick="del('${r.noGanti}')">DEL</button>
</td>

</tr>
`;
});

tbody.innerHTML=html;

});

}

// ================= EDIT / SAVE =================
function editSave(no){

if(!editMode[no]){
  editMode[no]=true;
  loadData();
  return;
}

let updated={
  sebab:document.getElementById("s-"+no)?.value,
  A_KURSUS:document.getElementById("k-"+no)?.value,
  A_KELAS:document.getElementById("kl-"+no)?.value,
  A_TARIKH:document.getElementById("t-"+no)?.value,
  A_MASA:document.getElementById("m-"+no)?.value,
  A_BILIK:document.getElementById("b-"+no)?.value
};

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"update",
    no:no,
    updated:updated
  })
})
.then(()=>{

delete editMode[no];
loadData();

});

}

// ================= DELETE =================
function del(no){

if(!confirm("Delete?")) return;

fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"delete",
    no:no
  })
})
.then(()=>loadData());

}

// ================= PDF =================
function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF("l","mm","a4");

doc.text("BORANG PENGGANTIAN KULIAH", 148, 15, {align:"center"});

let table = store.map((r,i)=>[
i+1,
r.noGanti,
r.sebab,
r.A_KURSUS,
r.A_KELAS,
r.A_TARIKH,
r.A_MASA,
r.A_BILIK,
r.status
]);

doc.autoTable({
startY:25,
head:[["Bil","ID","Sebab","Kursus","Kelas","Tarikh","Masa","Bilik","Status"]],
body:table,
styles:{fontSize:8}
});

doc.save("ganti_kuliah.pdf");

}

</script>

</body>
</html>
